<div class="view" id="view-form">
  <div class="form-wrap">

    <div class="form-section">
      <div class="form-sec-hd">📦 Set details</div>
      <div class="form-field">
        <label class="f-label">Set_ID</label>
        <div class="lookup-row">
          <input class="f-input" id="f-setNo" type="text" inputmode="numeric" placeholder="e.g. 10305">
          <button class="btn-lookup" id="btnLookup" onclick="doLookup()">
            <div class="look-spinner"></div>
            <span class="look-label">🔍 Lookup</span>
          </button>
        </div>
      </div>
      <div class="lookup-result" id="lookupResult"></div>
      <div class="form-field">
        <label class="f-label">Set Name <span style="color:var(--red)">* REQUIRED</span></label>
        <input class="f-input" id="f-name" type="text">
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="f-label">Theme</label>
          <input class="f-input" id="f-theme" type="text">
        </div>
        <div class="form-field">
          <label class="f-label">Year</label>
          <input class="f-input" id="f-year" type="text">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="f-label">Pieces</label>
          <input class="f-input" id="f-pieces" type="number">
        </div>
        <div class="form-field">
          <label class="f-label">UK RRP (£)</label>
          <input class="f-input" id="f-rrp" type="number" step="0.01">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="f-label">Est. Build Time</label>
          <div style="padding-top:6px"><span class="build-preview" id="buildPrev">-</span></div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-sec-hd">🚦 Built Status <span style="color:var(--red)">* REQUIRED</span></div>
      <div class="form-field">
        <div id="status-error" style="display:none;color:var(--red);font-size:.8rem;font-weight:800;margin-bottom:8px">⚠️ You must select a status</div>
        <div class="status-grid">
          <button class="s-btn" onclick="pickStatus('Built')">🏗️ Built</button>
          <button class="s-btn" onclick="pickStatus('Backlog')">📦 Backlog</button>
          <button class="s-btn" onclick="pickStatus('In Progress')">🔨 In Progress</button>
          <button class="s-btn" onclick="pickStatus('Backlog - Opened')">📂 Backlog - Opened</button>
          <button class="s-btn" onclick="pickStatus('Awaiting Delivery')">🚚 Awaiting Delivery</button>
          <button class="s-btn" onclick="pickStatus('Investment')">💰 Investment</button>
          <button class="s-btn" onclick="pickStatus('Parted Out')">🔩 Parted Out</button>
          <button class="s-btn" onclick="pickStatus('Sell (BNIB)')">🏷️ Sell (BNIB)</button>
          <button class="s-btn" onclick="pickStatus('Sell (Used)')">🏷️ Sell (Used)</button>
          <button class="s-btn" onclick="pickStatus('Returning')">🔁 Returning</button>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-sec-hd">🛒 Purchase details</div>
      <div class="form-row">
        <div class="form-field">
          <label class="f-label">Purchase Price (£)</label>
          <input class="f-input" id="f-price" type="number" step="0.01" inputmode="decimal" placeholder="0.00">
        </div>
        <div class="form-field">
          <label class="f-label">Ownership</label>
          <select class="f-select" id="f-ownership">
            <option value="">- Select -</option>
            <option>Personal</option><option>Business</option><option>Charlotte</option>
            <option>Lizzy</option><option>Investment</option><option>Awaiting Delivery</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="f-label">Retailer</label>
          <select class="f-select" id="f-retailer">
            <option value="">- Select -</option>
            <option>Lego.com</option><option>Amazon</option><option>Argos</option><option>Smyths</option><option>eBay</option><option>Other</option>
          </select>
        </div>
        <div class="form-field">
          <label class="f-label">Purchase Date</label>
          <input class="f-input" id="f-purchaseDate" type="date">
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-sec-hd">📝 Other Info</div>
      <div class="form-row">
        <div class="form-field">
          <label class="f-label">Location</label>
          <input class="f-input" id="f-location" type="text" placeholder="e.g. Dining Room">
        </div>
        <div class="form-field">
          <label class="f-label">Built Date</label>
          <input class="f-input" id="f-builtDate" type="date">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="f-label">Purpose</label>
          <input class="f-input" id="f-purpose" type="text" list="purposeList" placeholder="Display, Winter Village…">
          <datalist id="purposeList">
            <option value="Display"><option value="Lego City"><option value="Winter Village">
            <option value="Charlotte"><option value="Sell"><option value="2nd copy">
            <option value="Beach Scene"><option value="Elephants"><option value="Christmas 2025">
          </datalist>
        </div>
        <div class="form-field">
          <label class="f-label">Keep / Sell</label>
          <select class="f-select" id="f-keepSell">
            <option value="">-</option>
            <option>Keep</option><option>Sell</option><option>Undecided</option>
          </select>
        </div>
      </div>
    </div>

    <button class="btn-save" id="btnSave" onclick="submitForm()">Save Set</button>
    <button class="btn-del"  id="btnDel"  onclick="confirmDelete()">Delete Set</button>
  </div>
</div>
